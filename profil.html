<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Keluarga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen pb-24">

    <main class="p-6 max-w-md mx-auto space-y-6">
        <div id="profil-container" class="bg-white p-6 rounded-2xl shadow-sm text-center border border-slate-100">
            <h2 id="nama" class="text-2xl font-bold text-slate-800">Memuat...</h2>
            <p id="info-hubungan" class="text-indigo-600 font-semibold mt-1"></p>
            <p id="info-lahir" class="text-slate-400 text-sm italic"></p>
            <p id="bio" class="mt-6 text-sm text-slate-600 leading-relaxed"></p>
            
            <div class="mt-8">
                <a href="pohon.html" class="text-indigo-600 font-bold hover:underline">← Kembali ke Pohon</a>
            </div>
        </div>
    </main>

    <script src="nav.js"></script>

    <script>
        const supabaseClient = supabase.createClient("https://pezeaynamizawbxdywow.supabase.co", "sb_publishable_a3Wb0E4F-7mdG4mQAwn4Yw_CnunlYvU");
        
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        async function loadProfil() {
            const { data, error } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('id', userId)
                .single();
            
            if (data) {
                document.getElementById('nama').innerText = data.nama_keluarga;
                document.getElementById('info-hubungan').innerText = data.hubungan_keluarga || "";
                document.getElementById('info-lahir').innerText = data.tanggal_lahir ? "Lahir: " + data.tanggal_lahir : "";
                document.getElementById('bio').innerText = data.biografi || "Belum ada cerita biografi untuk profil ini.";
            } else {
                document.getElementById('nama').innerText = "Profil tidak ditemukan";
            }
        }
        loadProfil();
    </script>
</body>
</html>
