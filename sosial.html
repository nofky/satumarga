<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabar Keluarga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen pb-24">
    <main class="p-6 max-w-md mx-auto space-y-6">
        
        <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm space-y-3">
            <div class="flex items-center pt-2">
                <input type="text" id="input-cerita" placeholder="Bagikan cerita keluarga..." class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm w-full focus:outline-none focus:border-indigo-500">
            </div>
            <p class="text-[10px] text-slate-400 italic text-right">Tekan Enter untuk kirim</p>
        </div>

        <div id="feed-container" class="space-y-4">
            <p class="text-center text-xs text-slate-400">Memuat cerita keluarga...</p>
        </div>
    </main>

    <script src="nav.js"></script>
    <script>
        const SUPABASE_URL = "https://pezeaynamizawbxdywow.supabase.co";
        const SUPABASE_KEY = "sb_publishable_a3Wb0E4F-7mdG4mQAwn4Yw_CnunlYvU";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const inputCerita = document.getElementById('input-cerita');
        const feedContainer = document.getElementById('feed-container');

        // Fungsi Suka (Interaktif)
        function toggleSuka(btn) {
            btn.classList.toggle('text-red-500');
            btn.classList.toggle('text-slate-500');
            btn.querySelector('span').innerText = btn.classList.contains('text-red-500') ? "Disukai" : "Suka";
        }

        // Fungsi Komentar
        async function kirimKomentar(postId) {
            const isi = prompt("Tulis komentar kamu:");
            if (isi && isi.trim() !== "") {
                const nama = localStorage.getItem('nama_keluarga') || "Anonim";
                await supabaseClient.from('comments').insert([{ post_id: postId, nama_pengirim: nama, isi_komentar: isi }]);
                muatCeritaKeluarga(); 
            }
        }

        // Fungsi Bagikan (Facebook Style Share)
        async function bagikanPost() {
            if (navigator.share) {
                navigator.share({ title: 'Kabar Keluarga', url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Link disalin!');
            }
        }

        async function muatCeritaKeluarga() {
            const { data: posts } = await supabaseClient.from('posts').select(`*, comments (id, nama_pengirim, isi_komentar)`).order('created_at', { ascending: false });
            
            if (posts) {
                feedContainer.innerHTML = posts.map(post => {
                    const daftarKomentar = post.comments.map(c => `
                        <div class="bg-slate-50 p-2 rounded-lg mt-1">
                            <p class="text-[10px] font-bold text-slate-700">${c.nama_pengirim}</p>
                            <p class="text-[11px] text-slate-600">${c.isi_komentar}</p>
                        </div>
                    `).join('');

                    return `
                    <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-4">
                        <div class="flex items-center space-x-3 mb-3">
                            <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center font-bold text-indigo-600 text-sm">
                                ${post.nama_pengirim.charAt(0)}
                            </div>
                            <div>
                                <div class="text-sm font-bold text-slate-800">${post.nama_pengirim}</div>
                                <div class="text-[10px] text-slate-400">${post.hubungan}</div>
                            </div>
                        </div>
                        <p class="text-sm text-slate-700 mb-4">${post.isi_cerita}</p>
                        
                        <div class="flex border-t border-slate-50 pt-3 space-x-6">
                            <button onclick="toggleSuka(this)" class="text-xs text-slate-500 font-bold hover:text-red-600 flex items-center gap-1 transition">❤️ <span>Suka</span></button>
                            <button onclick="kirimKomentar(${post.id})" class="text-xs text-slate-500 font-bold hover:text-indigo-600 flex items-center gap-1 transition">💬 Komentar</button>
                            <button onclick="bagikanPost()" class="text-xs text-slate-500 font-bold hover:text-indigo-600 flex items-center gap-1 transition">🔗 Bagikan</button>
                        </div>
                        
                        <div class="mt-2 space-y-1">${daftarKomentar}</div>
                    </div>`;
                }).join('');
            }
        }

        inputCerita.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter' && inputCerita.value.trim()) {
                const nama = localStorage.getItem('nama_keluarga') || "Anonim";
                const hubungan = localStorage.getItem('hubungan_keluarga') || "Keluarga";
                await supabaseClient.from('posts').insert([{ nama_pengirim: nama, hubungan: hubungan, isi_cerita: inputCerita.value }]);
                inputCerita.value = "";
                muatCeritaKeluarga();
            }
        });

        muatCeritaKeluarga();
    </script>
</body>
</html>
